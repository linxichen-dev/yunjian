        function renderMonthView() {
            const base = today();
            base.setMonth(base.getMonth() + monthOffset);
            const year = base.getFullYear(),
                month = base.getMonth();
            document.getElementById('monthTitle').textContent = year + '年' + (month + 1) + '月';
            document.getElementById('monthBadge').textContent = '本月';
            const daysInMonth = getMonthDays(year, month);
            const firstDay = getDayOfWeek(year, month, 1);
            const prevMonthDays = getMonthDays(year, month - 1);
            const grid = document.getElementById('monthGrid');
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            const todayStr = formatDate(today());
            let html = `<div class="month-grid">`;
            weekdays.forEach(w => { html +=
                    `<div style="background:var(--bg);padding:6px 4px;text-align:center;font-weight:600;font-size:13px;color:var(--text-secondary);">${w}</div>`; });
            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            for (let i = 0; i < totalCells; i++) {
                let day, isOtherMonth = false;
                if (i < firstDay) { day = prevMonthDays - firstDay + i + 1;
                    isOtherMonth = true; } else if (i >= firstDay + daysInMonth) { day = i - firstDay - daysInMonth + 1;
                    isOtherMonth = true; } else { day = i - firstDay + 1; }
                const d = new Date(year, month, day);
                const ds = formatDate(d);
                const isToday = ds === todayStr;
                const evs = getEventsForDate(ds);
                html += `<div class="day-cell" data-date="${ds}">
                    <span class="day-num ${isToday?'today':''} ${isOtherMonth?'other-month':''}">${day}</span>
                    <div class="ev-dots">
                        ${evs.slice(0,3).map(e => `<span class="ev-label" data-id="${e.id}">${escapeHtml(e.title)}</span>`).join('')}
                        ${evs.length>3?`<span class="ev-label" style="background:transparent;color:var(--text-secondary);">+${evs.length-3}</span>`:''}
                    </div>
                </div>`;
            }
            html += `</div>`;
            grid.innerHTML = html;
            grid.querySelectorAll('.day-cell').forEach(el => el.addEventListener('click', function(e) {
                if (e.target.closest('.ev-label') && e.target.dataset.id) {
                    e.stopPropagation();
                    openEditEventModal(e.target.dataset.id);
                    return;
                }
                openModal(this.dataset.date, 9);
            }));
            grid.querySelectorAll('.ev-label[data-id]').forEach(el => {
                el.style.cursor = 'pointer';
                el.title = '点击编辑';
                el.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    showContextMenu(e, this, { type: 'event', id: this.dataset.id });
                });
            });
        }

        // ================================================================
        //  弹窗
        // ================================================================
        let modalDate = '',
            modalHour = 9;
        let editingEventId = null;

        function openModal(date, hour) {
            editingEventId = null;
            modalDate = date;
            modalHour = hour;
            document.getElementById('modalTitle').textContent = '添加事件 · ' + date;
            document.getElementById('modalEventTitle').value = '';
            document.getElementById('modalEventTime').value = String(hour).padStart(2, '0') + ':00';
            document.getElementById('modalEventDesc').value = '';
            document.getElementById('eventModal').classList.add('open');
            document.getElementById('modalEventTitle').focus();
        }

        function closeModal() { document.getElementById('eventModal').classList.remove('open');
            editingEventId = null; }

        function confirmModal() {
            const title = document.getElementById('modalEventTitle').value.trim();
            const time = document.getElementById('modalEventTime').value;
            const desc = document.getElementById('modalEventDesc').value.trim();
            if (!title) { alert('请输入事件标题'); return; }
            if (editingEventId) {
                const ev = events.find(e => e.id === editingEventId);
                if (ev) { ev.title = title;
                    ev.time = time || '09:00';
                    ev.desc = desc;
                    ev.date = modalDate; }
            } else {
                events.push({ id: generateId(), title, date: modalDate, time: time || '09:00', desc });
            }
            DB.set('events', events);
            closeModal();
            refreshCurrentScheduleView();
        }

        function refreshCurrentScheduleView() {
            const pages = ['dayPlanPage', 'weekPlanPage', 'monthPlanPage'];
            for (let id of pages) {
                if (document.getElementById(id).classList.contains('active')) {
                    if (id === 'dayPlanPage') renderDayView();
                    else if (id === 'weekPlanPage') renderWeekView();
                    else if (id === 'monthPlanPage') renderMonthView();
                    break;
                }
            }
        }

        document.getElementById('modalCancel').addEventListener('click', closeModal);
        document.getElementById('modalConfirm').addEventListener('click', confirmModal);
        document.getElementById('eventModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { if (document.getElementById('eventModal').classList.contains('open')) closeModal(); }
            if (e.key === 'Enter' && document.getElementById('eventModal').classList.contains('open')) {
                if (['modalEventTitle', 'modalEventTime', 'modalEventDesc'].includes(document.activeElement.id))
                    confirmModal();
            }
        });

        // ================================================================
        //  页面切换 & 导航
        // ================================================================
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (pageId === 'dayPlanPage') renderDayView();
            else if (pageId === 'weekPlanPage') renderWeekView();
            else if (pageId === 'monthPlanPage') renderMonthView();
            else if (pageId === 'notePage') {
                renderNoteCalendar();
                renderNoteList();
            }
        }

        document.querySelectorAll('.home-card[data-page]').forEach(el => el.addEventListener('click', function() {
            showPage(this.dataset.page);
        }));
        document.querySelectorAll('.back-btn[data-back]').forEach(el => el.addEventListener('click', function() {
            showPage(this.dataset.back);
        }));

        document.querySelectorAll('.choice-card[data-plan]').forEach(el => {
            el.addEventListener('click', function() {
                const plan = this.dataset.plan;
                if (plan === 'day') showPage('dayPlanPage');
                else if (plan === 'week') showPage('weekPlanPage');
                else if (plan === 'month') showPage('monthPlanPage');
            });
        });

        function setupNav(prefix, renderFn) {
            const prev = document.getElementById(prefix + 'Prev');
            const next = document.getElementById(prefix + 'Next');
            const todayBtn = document.getElementById(prefix + 'Today');
            if (prev) prev.addEventListener('click', function() {
                if (prefix === 'day') dayOffset--;
                else if (prefix === 'week') weekOffset--;
                else if (prefix === 'month') monthOffset--;
                renderFn();
            });
            if (next) next.addEventListener('click', function() {
                if (prefix === 'day') dayOffset++;
                else if (prefix === 'week') weekOffset++;
                else if (prefix === 'month') monthOffset++;
                renderFn();
            });
            if (todayBtn) todayBtn.addEventListener('click', function() {
                if (prefix === 'day') dayOffset = 0;
                else if (prefix === 'week') weekOffset = 0;
                else if (prefix === 'month') monthOffset = 0;
                renderFn();
            });
        }
        setupNav('day', renderDayView);
        setupNav('week', renderWeekView);
        setupNav('month', renderMonthView);

        // 快捷键
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'N') { e.preventDefault();
                showPage('notePage'); }
            if (e.ctrlKey && e.shiftKey && e.key === 'C') { e.preventDefault();
                showPage('scheduleChoicePage'); }
            if (e.ctrlKey && e.shiftKey && e.key === 'H') { e.preventDefault();
                showPage('homePage'); }
        });

        // ================================================================
        //  启动
        // ================================================================
        function init() {
            renderTodos();
            // 默认选中今天
            noteSelectedDate = formatDate(today());
            renderNoteCalendar();
            renderNoteList();
            renderDayView();
            renderWeekView();
            renderMonthView();
            // 如果noteTab是激活状态，刷新
            if (document.getElementById('noteTab').classList.contains('active')) {
                renderNoteCalendar();
                renderNoteList();
            }
        }
        init();
        console.log('📋 云笺 v2.0 已启动 (便条日历左右布局 + 触屏滑动)');
        console.log('快捷键: Ctrl+Shift+H 主页 | Ctrl+Shift+N 日常 | Ctrl+Shift+C 日程');
        console.log('✨ 新功能: 日历左右布局 · 触屏滑动切换 · 过去日期可写便条');
    </script>
</body>
</html>
